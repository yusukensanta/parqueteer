name: Feature Request
description: Suggest a new feature or enhancement for Parqueteer
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature suggestion! We appreciate ideas to make Parqueteer better.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - CLI / Commands
        - Output Formats
        - Filtering / Querying
        - Cloud Storage
        - Performance
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? What workflow is currently difficult?
      placeholder: "I frequently need to ... but currently have to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen
      placeholder: |
        Example CLI usage:
        ```
        parqueteer <new-command> --flag value
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much would this feature improve your workflow?
      options:
        - Nice to have
        - Would save me significant time
        - Blocking my use case
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references
    validations:
      required: false
