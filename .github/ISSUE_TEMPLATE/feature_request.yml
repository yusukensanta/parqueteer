name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Out of scope** (will be closed): SQL analytics/joins, general data exploration, streaming/batch processing, interactive REPL.
        See the [README scope section](../../README.md#project-scope) before filing.

  - type: checkboxes
    id: scope_check
    attributes:
      label: Scope Check
      options:
        - label: This is related to Parquet lifecycle operations (schema, I/O, conversion, inspection) — not SQL analytics or general exploration
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - CLI / Commands
        - Output Formats
        - Filtering
        - Cloud Storage
        - Performance
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What workflow is currently awkward or impossible?
      placeholder: "I need to ... but currently have to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: |
        ```
        parqueteer <command> --flag value
        ```
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Nice to have
        - Saves significant time
        - Blocking my use case
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
