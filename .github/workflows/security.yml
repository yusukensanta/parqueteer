# .github/workflows/security.yml
name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  pull_request:
    branches: [main]
    paths: ['build.sbt', 'project/**']
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run OWASP Dependency Check
        # dependency-check/Dependency-Check_Action@main (pinned 2026-06-21)
        # Note: no setup-java before this step — JAVA_HOME must be unset so
        # the container's bundled JRE is discovered via PATH. setup-java sets
        # JAVA_HOME to a host path that doesn't exist inside the Docker image.
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: 'parqueteer'
          path: '.'
          format: 'SARIF'
          out: 'reports'
          args: >
            --enableRetired
            --failOnCVSS 7

      - name: Upload SARIF results
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
