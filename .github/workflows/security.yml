# .github/workflows/security.yml
name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  pull_request:
    branches: [main]
    paths: ['build.sbt', 'project/**']
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy vulnerability scanner
        # aquasecurity/trivy-action@0.31.0
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: always()
        with:
          sarif_file: trivy-results.sarif
