# .github/workflows/security.yml
name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Java
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main  # maintainers use @main as stable; only 2 releases both from 2021
        with:
          project: 'parqueteer'
          path: '.'
          format: 'SARIF'
          out: 'reports'
          args: >
            --enableRetired
            --failOnCVSS 9

      - name: Upload SARIF results
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
