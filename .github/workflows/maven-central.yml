name: Publish to Maven Central

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Required for sbt-dynver to determine version

      - name: Setup Java
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          ./cs setup --yes --jvm 21
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}

      - name: Setup GPG
        run: |
          echo "${{ secrets.PGP_SECRET }}" | base64 --decode | gpg --batch --import
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg --list-secret-keys --keyid-format=long

      - name: Publish to Maven Central
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Wait for Maven Central sync
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Waiting for io.github.yusukensanta:parqueteer_3:${VERSION} on Maven Central..."
          for i in $(seq 1 20); do
            FOUND=$(curl -s "https://search.maven.org/solrsearch/select?q=g:io.github.yusukensanta+AND+a:parqueteer_3+AND+v:${VERSION}&rows=1&wt=json" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['numFound'])" 2>/dev/null || echo 0)
            if [ "${FOUND}" -gt "0" ]; then
              echo "Available on Maven Central after $((i * 60))s"
              exit 0
            fi
            [ "$i" -eq "20" ] && { echo "Warning: not found after 20 min, continuing anyway"; exit 0; }
            echo "Attempt $i/20: not yet indexed, retrying in 60s..."
            sleep 60
          done

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yusukensanta/homebrew-parqueteer.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/parqueteer.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/parqueteer.rb
          git diff --cached --quiet || git commit -m "chore: update parqueteer to v${VERSION}"
          git push
