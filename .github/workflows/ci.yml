name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['21', '17']

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Java ${{ matrix.java }}
        # actions/setup-java@v4.7.1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'sbt'

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          ./cs setup --yes --jvm ${{ matrix.java }}
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        # actions/cache@v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-java${{ matrix.java }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            ${{ runner.os }}-java${{ matrix.java }}-sbt-

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test

      - name: Check formatting
        run: sbt scalafmtCheckAll
