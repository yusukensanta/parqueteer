name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.scala'
      - '**/*.sbt'
      - 'project/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['21', '17']

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java ${{ matrix.java }}
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'sbt'

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/download/v2.1.24/cs-x86_64-pc-linux.gz | gzip -d > cs
          echo '1517a0b6c4b9608dc45da8f34bc8290707ed50104ee92662f57808d2c012be54  cs' | sha256sum -c
          chmod +x cs
          ./cs setup --yes --jvm ${{ matrix.java }}
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        # actions/cache@v5
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-java${{ matrix.java }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            ${{ runner.os }}-java${{ matrix.java }}-sbt-

      - name: Compile
        run: sbt compile

      - name: Test
        if: matrix.java != '21'
        run: sbt test

      - name: Coverage Report
        if: matrix.java == '21'
        run: sbt coverage test coverageReport

      - name: Upload Coverage Report
        if: matrix.java == '21'
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: target/scala-*/scoverage-report/
          if-no-files-found: ignore

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Generate dependency snapshot (SBOM)
        if: matrix.java == '21'
        run: |
          sbt 'dependencyTree / toFile target/dependency-tree.txt' || \
            sbt dependencyTree > target/dependency-tree.txt 2>&1

      - name: Upload dependency snapshot
        if: matrix.java == '21'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-snapshot
          path: target/dependency-tree.txt
          if-no-files-found: ignore

      - name: Check architecture boundaries
        run: |
          VIOLATIONS=$(grep -rn 'cli\.' src/main/scala/io/github/yusukensanta/parqueteer/core/ src/main/scala/io/github/yusukensanta/parqueteer/cloud/ 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Architecture violation: core/cloud layers must not reference cli package"
            echo "$VIOLATIONS"
            exit 1
          fi

  s3-integration:
    name: S3 Integration Tests (RustFS)
    runs-on: ubuntu-latest

    services:
      rustfs:
        image: rustfs/rustfs@sha256:fa19210ac4697c79d7ccca1ec9b0eb91aebacc6691991ffb14014bb3c67e6cc3
        ports:
          - 9000:9000
        env:
          RUSTFS_ACCESS_KEY: testkey
          RUSTFS_SECRET_KEY: testsecret
          RUSTFS_VOLUMES: /data
          RUSTFS_ADDRESS: ":9000"
          RUSTFS_CONSOLE_ENABLE: "false"
        # No in-container health check: RustFS image is distroless (no curl/wget).
        # We wait from the runner instead (see "Wait for RustFS" step below).

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java 21
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/download/v2.1.24/cs-x86_64-pc-linux.gz | gzip -d > cs
          echo '1517a0b6c4b9608dc45da8f34bc8290707ed50104ee92662f57808d2c012be54  cs' | sha256sum -c
          chmod +x cs
          ./cs setup --yes --jvm 21
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-java21-sbt-s3-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            ${{ runner.os }}-java21-sbt-

      - name: Wait for RustFS to be ready
        run: |
          echo "Waiting for RustFS S3 API on port 9000..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/ 2>/dev/null || echo "000")
            # RustFS returns 403 for unsigned requests — that means it is up
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ]; then
              echo "RustFS ready (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS — waiting 3s..."
            sleep 3
          done
          echo "ERROR: RustFS did not become ready after 90s"
          exit 1

      - name: Run S3 integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: testkey
          AWS_SECRET_ACCESS_KEY: testsecret
          AWS_REGION: us-east-1
        run: sbt "testOnly io.github.yusukensanta.parqueteer.cloud.S3IntegrationTest io.github.yusukensanta.parqueteer.cloud.CloudCredentialManagerTest"
