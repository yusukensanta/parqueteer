name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)

permissions:
  contents: write  # Required for creating releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.0
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Java
        # actions/setup-java@v4.7.1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Verify version matches build.sbt
        run: |
          BUILD_VERSION=$(grep 'ThisBuild / version :=' build.sbt | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          echo "build.sbt version: $BUILD_VERSION"
          echo "Tag version: $TAG_VERSION"

          # Allow release if build.sbt is already updated to release version
          # (happens when using sbt-release plugin)
          if [ "$BUILD_VERSION" != "$TAG_VERSION" ]; then
            echo "⚠️  Warning: Version mismatch, but continuing with tag version: $TAG_VERSION"
          fi

      - name: Run tests
        run: sbt clean test

      - name: Build universal distributions
        run: |
          # Override version to match git tag
          sbt 'set version := "${{ steps.version.outputs.VERSION }}"' \
              Universal/packageBin \
              Universal/packageZipTarball

      - name: Generate checksums
        run: |
          cd target/universal
          sha256sum *.tgz *.zip > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Prepare release artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "TGZ_FILE=target/universal/parqueteer-${VERSION}.tgz" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=target/universal/parqueteer-${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "CHECKSUMS=target/universal/checksums.txt" >> $GITHUB_OUTPUT

          # Verify files exist
          ls -lh target/universal/

      - name: Create GitHub Release
        # softprops/action-gh-release@v2.4.1
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090
        with:
          files: |
            ${{ steps.artifacts.outputs.TGZ_FILE }}
            ${{ steps.artifacts.outputs.ZIP_FILE }}
            ${{ steps.artifacts.outputs.CHECKSUMS }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
          body: |
            ## Installation

            ### Linux / macOS
            ```bash
            tar -xzf parqueteer-${{ steps.version.outputs.VERSION }}.tgz
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            ./bin/parqueteer --version
            ```

            ### Windows
            ```powershell
            # Extract the zip file
            # Then run:
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            bin\parqueteer.bat --version
            ```

            ### Verify Download
            ```bash
            sha256sum -c checksums.txt
            ```

            ## What's Changed
            <!-- Generated release notes will be appended below -->

      - name: Upload build artifacts to workflow
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: parqueteer-${{ steps.version.outputs.VERSION }}
          path: |
            target/universal/*.tgz
            target/universal/*.zip
            target/universal/checksums.txt
          retention-days: 30
