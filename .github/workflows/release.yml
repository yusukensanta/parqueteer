name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)

permissions:
  contents: write  # Required for creating releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Java
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Show version info
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Tag version: $TAG_VERSION"
          echo "Note: Using sbt-ci-release for automatic version management from git tags"

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          ./cs setup --yes --jvm 21
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}

      - name: Run tests
        run: sbt clean test

      - name: Build universal distributions
        run: |
          # Override version to match git tag
          sbt 'set version := "${{ steps.version.outputs.VERSION }}"' \
              Universal/packageBin \
              Universal/packageZipTarball

      - name: Generate checksums
        run: |
          cd target/universal
          sha256sum *.tgz *.zip > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Prepare release artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "TGZ_FILE=target/universal/parqueteer-${VERSION}.tgz" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=target/universal/parqueteer-${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "CHECKSUMS=target/universal/checksums.txt" >> $GITHUB_OUTPUT

          # Verify files exist
          ls -lh target/universal/

      - name: Create GitHub Release
        # softprops/action-gh-release@v3.0.0
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            ${{ steps.artifacts.outputs.TGZ_FILE }}
            ${{ steps.artifacts.outputs.ZIP_FILE }}
            ${{ steps.artifacts.outputs.CHECKSUMS }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
          body: |
            ## Installation

            ### Homebrew (macOS/Linux)
            ```bash
            brew tap yusukensanta/parqueteer
            brew install parqueteer
            ```

            ### curl (macOS/Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/yusukensanta/parqueteer/main/scripts/install.sh | bash
            ```

            ### Manual Installation

            #### Linux / macOS
            ```bash
            tar -xzf parqueteer-${{ steps.version.outputs.VERSION }}.tgz
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            ./bin/parqueteer --version
            ```

            #### Windows
            ```powershell
            # Extract the zip file
            # Then run:
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            bin\parqueteer.bat --version
            ```

            ### Verify Download
            ```bash
            sha256sum -c checksums.txt
            ```

            ## What's Changed
            <!-- Generated release notes will be appended below -->

      - name: Upload build artifacts to workflow
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: parqueteer-${{ steps.version.outputs.VERSION }}
          path: |
            target/universal/*.tgz
            target/universal/*.zip
            target/universal/checksums.txt
          retention-days: 30

      # Homebrew tap update runs in maven-central.yml after artifact is published
      # so that `cs launch` in the formula can resolve the artifact immediately.
