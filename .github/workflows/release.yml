name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)

permissions:
  contents: write  # Required for creating releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Java
        # actions/setup-java@v4.7.1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Show version info
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Tag version: $TAG_VERSION"
          echo "Note: Using sbt-ci-release for automatic version management from git tags"

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          ./cs setup --yes --jvm 21
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}

      - name: Run tests
        run: sbt clean test

      - name: Build universal distributions
        run: |
          # Override version to match git tag
          sbt 'set version := "${{ steps.version.outputs.VERSION }}"' \
              Universal/packageBin \
              Universal/packageZipTarball

      - name: Generate checksums
        run: |
          cd target/universal
          sha256sum *.tgz *.zip > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Prepare release artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "TGZ_FILE=target/universal/parqueteer-${VERSION}.tgz" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=target/universal/parqueteer-${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "CHECKSUMS=target/universal/checksums.txt" >> $GITHUB_OUTPUT

          # Verify files exist
          ls -lh target/universal/

      - name: Create GitHub Release
        # softprops/action-gh-release@v2.4.1
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            ${{ steps.artifacts.outputs.TGZ_FILE }}
            ${{ steps.artifacts.outputs.ZIP_FILE }}
            ${{ steps.artifacts.outputs.CHECKSUMS }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
          body: |
            ## Installation

            ### Homebrew (macOS/Linux)
            ```bash
            brew tap yusukensanta/parqueteer
            brew install parqueteer
            ```

            ### curl (macOS/Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/yusukensanta/parqueteer/main/scripts/install.sh | bash
            ```

            ### Manual Installation

            #### Linux / macOS
            ```bash
            tar -xzf parqueteer-${{ steps.version.outputs.VERSION }}.tgz
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            ./bin/parqueteer --version
            ```

            #### Windows
            ```powershell
            # Extract the zip file
            # Then run:
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            bin\parqueteer.bat --version
            ```

            ### Verify Download
            ```bash
            sha256sum -c checksums.txt
            ```

            ## What's Changed
            <!-- Generated release notes will be appended below -->

      - name: Upload build artifacts to workflow
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: parqueteer-${{ steps.version.outputs.VERSION }}
          path: |
            target/universal/*.tgz
            target/universal/*.zip
            target/universal/checksums.txt
          retention-days: 30

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TGZ_FILE="parqueteer-${VERSION}.tgz"

          # Get SHA256 from checksums.txt
          SHA256=$(grep "$TGZ_FILE" target/universal/checksums.txt | awk '{print $1}')

          # Update Formula/parqueteer.rb
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/parqueteer.rb
          sed -i "s|url \".*\"|url \"https://github.com/yusukensanta/parqueteer/releases/download/v${VERSION}/parqueteer-${VERSION}.tgz\"|" Formula/parqueteer.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/parqueteer.rb

          echo "Updated Homebrew formula:"
          cat Formula/parqueteer.rb

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash
          git fetch origin main
          git checkout main
          git pull origin main
          git stash pop

          git add Formula/parqueteer.rb
          git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Failed to push formula update"
