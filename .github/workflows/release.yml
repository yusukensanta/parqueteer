name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)

permissions:
  contents: write  # Required for creating releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Java
        # actions/setup-java@v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Show version info
        env:
          TAG_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "Tag version: $TAG_VERSION"
          echo "Note: Using sbt-ci-release for automatic version management from git tags"

      - name: Setup sbt via Coursier
        run: |
          curl -fL https://github.com/coursier/coursier/releases/download/v2.1.24/cs-x86_64-pc-linux.gz | gzip -d > cs
          echo '1517a0b6c4b9608dc45da8f34bc8290707ed50104ee92662f57808d2c012be54  cs' | sha256sum -c
          chmod +x cs
          ./cs setup --yes --jvm 21
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH

      - name: Cache sbt dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}

      - name: Run tests
        run: sbt clean test

      - name: Build universal distributions
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sbt "set version := \"${VERSION}\"" \
              Universal/packageBin \
              Universal/packageZipTarball

      - name: Generate checksums
        run: |
          cd target/universal
          sha256sum *.tgz *.zip > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Prepare release artifacts
        id: artifacts
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "TGZ_FILE=target/universal/parqueteer-${VERSION}.tgz" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=target/universal/parqueteer-${VERSION}.zip" >> $GITHUB_OUTPUT
          echo "CHECKSUMS=target/universal/checksums.txt" >> $GITHUB_OUTPUT

          # Verify files exist
          ls -lh target/universal/

      - name: Create GitHub Release
        # softprops/action-gh-release@v3.0.0
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            ${{ steps.artifacts.outputs.TGZ_FILE }}
            ${{ steps.artifacts.outputs.ZIP_FILE }}
            ${{ steps.artifacts.outputs.CHECKSUMS }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
          body: |
            ## Installation

            ### Homebrew (macOS/Linux)
            ```bash
            brew tap yusukensanta/parqueteer
            brew install parqueteer
            ```

            ### curl (macOS/Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/yusukensanta/parqueteer/main/scripts/install.sh | bash
            ```

            ### Manual Installation

            #### Linux / macOS
            ```bash
            tar -xzf parqueteer-${{ steps.version.outputs.VERSION }}.tgz
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            ./bin/parqueteer --version
            ```

            #### Windows
            ```powershell
            # Extract the zip file
            # Then run:
            cd parqueteer-${{ steps.version.outputs.VERSION }}
            bin\parqueteer.bat --version
            ```

            ### Verify Download
            ```bash
            sha256sum -c checksums.txt
            ```

            ## What's Changed
            <!-- Generated release notes will be appended below -->

      - name: Upload build artifacts to workflow
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: parqueteer-${{ steps.version.outputs.VERSION }}
          path: |
            target/universal/*.tgz
            target/universal/*.zip
            target/universal/checksums.txt
          retention-days: 30

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          TGZ_SHA=$(grep "parqueteer-${VERSION}.tgz" target/universal/checksums.txt | cut -d' ' -f1)
          TGZ_URL="https://github.com/yusukensanta/parqueteer/releases/download/v${VERSION}/parqueteer-${VERSION}.tgz"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yusukensanta/homebrew-parqueteer.git" /tmp/homebrew-tap

          cat > /tmp/homebrew-tap/Formula/parqueteer.rb << 'FORMULA'
          class Parqueteer < Formula
            desc "CLI tool for working with Parquet files - query, inspect, and convert with ease"
            homepage "https://github.com/yusukensanta/parqueteer"
            url "PLACEHOLDER_URL"
            sha256 "PLACEHOLDER_SHA"
            version "PLACEHOLDER_VERSION"
            license "Apache-2.0"

            depends_on "openjdk@21"

            def install
              rm_r Dir["bin/*.bat"]
              libexec.install Dir["*"]
              (bin/"parqueteer").write_env_script libexec/"bin/parqueteer",
                JAVA_HOME: Formula["openjdk@21"].opt_prefix
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/parqueteer --version 2>&1")
            end
          end
          FORMULA

          sed -i "s|PLACEHOLDER_URL|${TGZ_URL}|" /tmp/homebrew-tap/Formula/parqueteer.rb
          sed -i "s|PLACEHOLDER_SHA|${TGZ_SHA}|" /tmp/homebrew-tap/Formula/parqueteer.rb
          sed -i "s|PLACEHOLDER_VERSION|${VERSION}|" /tmp/homebrew-tap/Formula/parqueteer.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/parqueteer.rb
          git diff --cached --quiet || git commit -m "chore: update parqueteer to v${VERSION}"
          git push

      - name: Trigger portfolio sync
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PORTFOLIO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/yusukensanta/yusukensanta.github.io/dispatches \
            -d "{\"event_type\":\"parqueteer-release\",\"client_payload\":{\"version\":\"v${VERSION}\"}}"
