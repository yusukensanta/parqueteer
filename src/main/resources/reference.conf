parqueteer {
  # Application name and version
  name = "parqueteer"
  version = "0.1.0"

  # Default configuration values
  defaults {
    compression = "snappy"
    row-group-size = 134217728  # 128MB
    page-size = 1048576         # 1MB
    output-format = "table"
    max-rows = 1000
  }

  # Cloud provider settings
  cloud {
    s3 {
      default-region = "us-east-1"
      buffer-size = 67108864     # 64MB
      multipart-threshold = 104857600  # 100MB
    }

    gcs {
      buffer-size = 67108864     # 64MB
      chunk-size = 33554432      # 32MB
    }

    azure {
      buffer-size = 67108864     # 64MB
    }
  }

  # Performance tuning
  performance {
    max-concurrency = 4
    enable-caching = true
    cache-size = 268435456       # 256MB
  }
}
